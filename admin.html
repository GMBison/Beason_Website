<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEASON Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06111a;
      --panel: rgba(10, 27, 41, 0.94);
      --panel-soft: rgba(15, 36, 55, 0.9);
      --line: rgba(145, 201, 244, 0.15);
      --text: #edf6ff;
      --muted: #93afc5;
      --accent: #6fd2ff;
      --accent-2: #4f8dff;
      --ok: #62e4a0;
      --warn: #f4c35d;
      --danger: #ff8074;
      --radius: 8px;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      font-family: "Inter", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(111, 210, 255, 0.08), transparent 26%),
        linear-gradient(180deg, #06111a 0%, #091927 100%);
    }
    button, input, select { font: inherit; }
    button {
      min-height: 46px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      font-weight: 700;
    }
    button.primary {
      color: #06111a;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    }
    button.warn {
      background: rgba(244, 195, 93, 0.14);
      border-color: rgba(244, 195, 93, 0.32);
    }
    button.danger {
      background: rgba(255, 128, 116, 0.14);
      border-color: rgba(255, 128, 116, 0.32);
    }
    .page {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }
    .screen,
    .panel,
    .modal-card,
    .table-wrap,
    .reseller-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hidden { display: none !important; }
    .login-shell {
      min-height: calc(100vh - 68px);
      display: grid;
      place-items: center;
    }
    .screen {
      width: min(460px, 100%);
      padding: 26px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 22px; font-size: 2rem; }
    h2 { margin-bottom: 0; font-size: 1.35rem; }
    h3 { margin-bottom: 0; font-size: 1rem; }
    .field,
    .field-stack {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .field-stack { gap: 14px; }
    input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }
    select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }
    .message,
    .hint,
    .meta,
    .small {
      color: var(--muted);
      line-height: 1.6;
    }
    .message { min-height: 22px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .actions,
    .duration-grid,
    .toolbar-actions,
    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .panel { padding: 20px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .pill.active { color: var(--ok); border-color: rgba(98, 228, 160, 0.28); }
    .pill.paused { color: var(--warn); border-color: rgba(244, 195, 93, 0.28); }
    .pill.restricted { color: var(--danger); border-color: rgba(255, 128, 116, 0.28); }
    .form-grid {
      display: grid;
      gap: 16px;
    }
    .duration-grid button {
      min-width: 104px;
      justify-content: center;
    }
    .duration-grid button.selected {
      color: #06111a;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    }
    .generator-status {
      display: grid;
      gap: 8px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }
    .owner-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 6px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 9, 14, 0.76);
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 20;
    }
    .modal-card {
      width: min(1080px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      padding: 20px;
    }
    .table-wrap {
      overflow: auto;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.95rem;
    }
    th {
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .reseller-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .reseller-card {
      padding: 16px;
      display: grid;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: none;
    }
    .reseller-card header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .card-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 860px) {
      .topbar,
      .panel-head,
      .owner-toolbar,
      .reseller-card header {
        align-items: flex-start;
        flex-direction: column;
      }
      .card-grid {
        grid-template-columns: 1fr;
      }
      .duration-grid button {
        min-width: 0;
        flex: 1 1 140px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section id="loginScreen" class="login-shell">
      <div class="screen">
        <p class="eyebrow">Staff Access</p>
        <h1>Sign in</h1>
        <div class="field-stack">
          <label class="field">Username<input id="usernameInput" type="text" autocomplete="username" /></label>
          <label class="field">Password<input id="passwordInput" type="password" autocomplete="current-password" /></label>
          <div class="actions">
            <button id="loginBtn" class="primary" type="button">Login</button>
          </div>
          <div id="loginMessage" class="message"></div>
        </div>
      </div>
    </section>

    <section id="dashboard" class="hidden">
      <div class="topbar">
        <div>
          <p class="eyebrow">Staff Session</p>
          <h2 id="welcomeName">-</h2>
          <div id="welcomeMeta" class="meta"></div>
        </div>
        <div class="toolbar-actions">
          <button id="viewLogsBtn" type="button" class="hidden">View logs</button>
          <button id="manageResellersBtn" type="button" class="hidden">Manage resellers</button>
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>

      <div class="layout">
        <section class="panel">
          <div class="panel-head">
            <h2>Key generator</h2>
            <span id="rolePill" class="pill">-</span>
          </div>
          <div class="form-grid">
            <label class="field">User HWID<input id="targetHwidInput" type="text" placeholder="PC-1234-ABCD" /></label>

            <div class="field">
              <span>Duration</span>
              <div class="duration-grid">
                <button type="button" data-duration="1day">1 day</button>
                <button type="button" data-duration="1month">1 month</button>
                <button type="button" data-duration="3months">3 months</button>
                <button type="button" data-duration="6months">6 months</button>
                <button type="button" data-duration="1year">1 year</button>
              </div>
            </div>

            <label class="field">Custom expiry<input id="customExpiryInput" type="datetime-local" /></label>
            <div id="expiryHint" class="hint">Pick a duration or set a custom expiry.</div>

            <label class="field">Internal note<input id="noteInput" type="text" placeholder="Optional note" /></label>

            <div class="actions">
              <button id="generateBtn" class="primary" type="button">Generate key</button>
              <button id="copyLatestBtn" type="button" class="hidden">Copy key</button>
            </div>

            <div class="generator-status">
              <div id="keyMessage" class="message"></div>
              <div id="keyMeta" class="meta"></div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </div>

  <div id="logsModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Owner View</p>
          <h2>Logs</h2>
        </div>
        <div class="toolbar-actions">
          <label class="field" style="min-width: 240px;">
            <span>Generated by</span>
            <select id="logsFilterSelect">
              <option value="">All accounts</option>
            </select>
          </label>
          <button type="button" data-close="logsModal">Close</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Account</th>
              <th>HWID</th>
              <th>Key</th>
              <th>Generated</th>
              <th>Duration</th>
              <th>Remaining</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="logsTableBody">
            <tr><td colspan="7" class="small">No logs yet.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="resellersModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Owner View</p>
          <h2>Manage resellers</h2>
        </div>
        <button type="button" data-close="resellersModal">Close</button>
      </div>
      <div class="card-grid">
        <section class="panel" style="padding: 18px;">
          <div class="panel-head">
            <h3>Create reseller</h3>
          </div>
          <div class="form-grid">
            <label class="field">Display name<input id="resellerNameInput" type="text" placeholder="Agent Prime" /></label>
            <label class="field">Username<input id="resellerUsernameInput" type="text" placeholder="agentprime" /></label>
            <label class="field">Password<input id="resellerPasswordInput" type="text" placeholder="Create a password" /></label>
            <div class="actions">
              <button id="createResellerBtn" class="primary" type="button">Create reseller</button>
            </div>
            <div id="resellerMessage" class="message"></div>
          </div>
        </section>

        <section class="panel" style="padding: 18px;">
          <div class="panel-head">
            <h3>Reseller accounts</h3>
          </div>
          <div id="resellerList" class="reseller-list">
            <div class="small">No reseller accounts yet.</div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const tokenKey = "beason_admin_token";
    const loginScreen = document.getElementById("loginScreen");
    const dashboard = document.getElementById("dashboard");
    const loginMessage = document.getElementById("loginMessage");
    const keyMessage = document.getElementById("keyMessage");
    const keyMeta = document.getElementById("keyMeta");
    const resellerMessage = document.getElementById("resellerMessage");
    const welcomeName = document.getElementById("welcomeName");
    const welcomeMeta = document.getElementById("welcomeMeta");
    const rolePill = document.getElementById("rolePill");
    const viewLogsBtn = document.getElementById("viewLogsBtn");
    const manageResellersBtn = document.getElementById("manageResellersBtn");
    const copyLatestBtn = document.getElementById("copyLatestBtn");
    const logsModal = document.getElementById("logsModal");
    const resellersModal = document.getElementById("resellersModal");
    const logsTableBody = document.getElementById("logsTableBody");
    const logsFilterSelect = document.getElementById("logsFilterSelect");
    const resellerList = document.getElementById("resellerList");
    const expiryHint = document.getElementById("expiryHint");

    const usernameInput = document.getElementById("usernameInput");
    const passwordInput = document.getElementById("passwordInput");
    const targetHwidInput = document.getElementById("targetHwidInput");
    const customExpiryInput = document.getElementById("customExpiryInput");
    const noteInput = document.getElementById("noteInput");
    const resellerNameInput = document.getElementById("resellerNameInput");
    const resellerUsernameInput = document.getElementById("resellerUsernameInput");
    const resellerPasswordInput = document.getElementById("resellerPasswordInput");
    const durationButtons = Array.from(document.querySelectorAll("[data-duration]"));

    let selectedDuration = "";
    let lastGeneratedKey = "";
    let latestOverview = null;

    function setMessage(target, text, tone) {
      target.textContent = text || "";
      target.style.color = tone === "error" ? "var(--danger)" : tone === "success" ? "var(--ok)" : "var(--muted)";
    }

    function getToken() {
      return localStorage.getItem(tokenKey) || "";
    }

    function saveSession(token) {
      localStorage.setItem(tokenKey, token);
    }

    function closeModal(modal) {
      modal.classList.add("hidden");
      modal.setAttribute("aria-hidden", "true");
    }

    function openModal(modal) {
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
    }

    function clearSession() {
      localStorage.removeItem(tokenKey);
      loginScreen.classList.remove("hidden");
      dashboard.classList.add("hidden");
      closeModal(logsModal);
      closeModal(resellersModal);
      lastGeneratedKey = "";
      latestOverview = null;
      copyLatestBtn.classList.add("hidden");
    }

    async function api(path, body = {}) {
      const response = await fetch(path, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: getToken() ? `Bearer ${getToken()}` : "",
        },
        body: JSON.stringify(body),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Request failed.");
      return data;
    }

    function formatDate(value) {
      return value ? new Date(value).toLocaleString() : "-";
    }

    function statusClass(status) {
      return status === "paused" ? "paused" : status === "restricted" ? "restricted" : "active";
    }

    function updateDurationButtons() {
      durationButtons.forEach((button) => {
        button.classList.toggle("selected", button.dataset.duration === selectedDuration);
      });
    }

    function getRelativeLabel(dateValue) {
      if (!dateValue) return "No expiry selected.";
      const remaining = new Date(dateValue).getTime() - Date.now();
      if (remaining <= 0) return "Expiry has passed.";
      const units = [
        { label: "year", size: 365 * 24 * 60 * 60 * 1000 },
        { label: "month", size: 30 * 24 * 60 * 60 * 1000 },
        { label: "day", size: 24 * 60 * 60 * 1000 },
        { label: "hour", size: 60 * 60 * 1000 },
        { label: "minute", size: 60 * 1000 },
      ];
      for (const unit of units) {
        if (remaining >= unit.size) {
          const amount = Math.max(1, Math.floor(remaining / unit.size));
          return `${amount} ${unit.label}${amount === 1 ? "" : "s"} left`;
        }
      }
      return "Less than a minute left";
    }

    function getSelectedExpiryText() {
      if (customExpiryInput.value) {
        return `Custom expiry set for ${formatDate(customExpiryInput.value)}. ${getRelativeLabel(customExpiryInput.value)}`;
      }
      const button = durationButtons.find((item) => item.dataset.duration === selectedDuration);
      return button ? `${button.textContent} selected.` : "Pick a duration or set a custom expiry.";
    }

    function refreshExpiryHint() {
      expiryHint.textContent = getSelectedExpiryText();
    }

    async function copyToClipboard(text, successTarget, successMessage) {
      if (!text) return;
      await navigator.clipboard.writeText(text);
      if (successTarget) setMessage(successTarget, successMessage, "success");
    }

    function populateLogFilters(keys) {
      const currentValue = logsFilterSelect.value;
      const options = Array.from(new Map(
        (keys || []).map((item) => {
          const value = String(item.generatedBy || "").trim().toLowerCase();
          const label = item.generatedByDisplayName || item.generatedBy || "-";
          return [value, { value, label }];
        }).filter(([value]) => value)
      ).values()).sort((left, right) => left.label.localeCompare(right.label));

      logsFilterSelect.innerHTML = [
        '<option value="">All accounts</option>',
        ...options.map((item) => `<option value="${item.value}">${item.label}</option>`),
      ].join("");

      if (options.some((item) => item.value === currentValue)) {
        logsFilterSelect.value = currentValue;
      }
    }

    function getFilteredLogs(keys) {
      const filter = String(logsFilterSelect.value || "").trim().toLowerCase();
      if (!filter) return keys;
      return keys.filter((item) => String(item.generatedBy || "").trim().toLowerCase() === filter);
    }

    function renderLogs(keys) {
      populateLogFilters(keys);
      const filteredKeys = getFilteredLogs(keys);
      if (!filteredKeys.length) {
        logsTableBody.innerHTML = '<tr><td colspan="7" class="small">No logs found for this account.</td></tr>';
        return;
      }

      logsTableBody.innerHTML = filteredKeys.map((item) => `
        <tr>
          <td>${item.generatedByDisplayName || item.generatedBy || "-"}</td>
          <td>${item.targetHwid || "-"}</td>
          <td><button type="button" data-copy-key="${item.keyId}">Copy key</button></td>
          <td>${formatDate(item.generatedAt)}</td>
          <td>${item.durationLabel || "-"}</td>
          <td>${item.remainingLabel || "-"}</td>
          <td><button type="button" class="danger" data-delete-key="${item.keyId}">Delete log</button></td>
        </tr>
      `).join("");

      logsTableBody.querySelectorAll("[data-copy-key]").forEach((button) => {
        button.addEventListener("click", async () => {
          const key = (latestOverview?.keys || []).find((item) => item.keyId === button.dataset.copyKey);
          if (!key?.productKey) return;
          try {
            await copyToClipboard(key.productKey, keyMessage, "Key copied.");
          } catch (error) {
            setMessage(keyMessage, "Clipboard copy failed.", "error");
          }
        });
      });

      logsTableBody.querySelectorAll("[data-delete-key]").forEach((button) => {
        button.addEventListener("click", async () => {
          const keyId = button.dataset.deleteKey;
          if (!keyId) return;
          if (!confirm("Delete this key log? This removes it from the owner logs table.")) return;
          try {
            await api("/api/admin/overview", { deleteKeyId: keyId });
            setMessage(keyMessage, "Log deleted.", "success");
            await loadOverview();
          } catch (error) {
            setMessage(keyMessage, error.message || "Could not delete log.", "error");
          }
        });
      });
    }

    function renderResellers(resellers) {
      if (!resellers.length) {
        resellerList.innerHTML = '<div class="small">No reseller accounts yet.</div>';
        return;
      }

      resellerList.innerHTML = resellers.map((item) => `
        <article class="reseller-card">
          <header>
            <div>
              <h3>${item.displayName}</h3>
              <div class="meta">@${item.username}</div>
            </div>
            <span class="pill ${statusClass(item.status)}">${item.status}</span>
          </header>
          <div class="meta">Keys generated: ${item.totalKeys}</div>
          <div class="meta">Last key: ${formatDate(item.recentKeyAt)}</div>
          <div class="inline-actions">
            <button type="button" data-user="${item.username}" data-status="active">Set active</button>
            <button type="button" class="warn" data-user="${item.username}" data-status="paused">Pause</button>
            <button type="button" class="danger" data-user="${item.username}" data-status="restricted">Restrict</button>
          </div>
        </article>
      `).join("");

      resellerList.querySelectorAll("[data-user]").forEach((button) => {
        button.addEventListener("click", async () => {
          try {
            await api("/api/admin/update-reseller", {
              username: button.dataset.user,
              status: button.dataset.status,
            });
            setMessage(resellerMessage, `${button.dataset.user} updated to ${button.dataset.status}.`, "success");
            await loadOverview();
          } catch (error) {
            setMessage(resellerMessage, error.message, "error");
          }
        });
      });
    }

    function renderOverview(data) {
      latestOverview = data;
      loginScreen.classList.add("hidden");
      dashboard.classList.remove("hidden");
      welcomeName.textContent = data.currentUser.displayName;
      welcomeMeta.textContent = `@${data.currentUser.username} | ${data.currentUser.status}`;
      rolePill.textContent = data.currentUser.role;
      rolePill.className = `pill ${statusClass(data.currentUser.status)}`;

      const owner = data.currentUser.role === "owner";
      viewLogsBtn.classList.toggle("hidden", !owner);
      manageResellersBtn.classList.toggle("hidden", !owner);

      if (owner) {
        renderLogs(data.keys || []);
        renderResellers(data.resellers || []);
      } else {
        closeModal(logsModal);
        closeModal(resellersModal);
      }
    }

    async function loadOverview() {
      const data = await api("/api/admin/overview");
      renderOverview(data);
    }

    durationButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedDuration = button.dataset.duration;
        customExpiryInput.value = "";
        updateDurationButtons();
        refreshExpiryHint();
      });
    });

    customExpiryInput.addEventListener("input", () => {
      if (customExpiryInput.value) {
        selectedDuration = "";
        updateDurationButtons();
      }
      refreshExpiryHint();
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      try {
        const data = await api("/api/admin/login", {
          username: usernameInput.value,
          password: passwordInput.value,
        });
        saveSession(data.token);
        passwordInput.value = "";
        setMessage(loginMessage, "Signed in.", "success");
        await loadOverview();
      } catch (error) {
        clearSession();
        setMessage(loginMessage, error.message, "error");
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        if (getToken()) await api("/api/admin/logout");
      } catch (error) {}
      clearSession();
      setMessage(loginMessage, "Signed out.", "success");
    });

    document.getElementById("refreshBtn").addEventListener("click", async () => {
      try {
        await loadOverview();
        setMessage(keyMessage, "Panel refreshed.", "success");
      } catch (error) {
        setMessage(keyMessage, error.message, "error");
      }
    });

    document.getElementById("generateBtn").addEventListener("click", async () => {
      try {
        const data = await api("/api/admin/generate-key", {
          targetHwid: targetHwidInput.value,
          duration: selectedDuration,
          customExpiresAt: customExpiryInput.value,
          note: noteInput.value,
        });
        lastGeneratedKey = data.key.productKey || "";
        targetHwidInput.value = "";
        noteInput.value = "";
        customExpiryInput.value = "";
        selectedDuration = "";
        updateDurationButtons();
        refreshExpiryHint();
        copyLatestBtn.classList.toggle("hidden", !lastGeneratedKey);
        await copyToClipboard(lastGeneratedKey, keyMessage, "Key generated and copied to clipboard.");
        keyMeta.textContent = `${data.key.durationLabel} | expires ${formatDate(data.key.expiresAt)} | ${data.key.remainingLabel}`;
        if (latestOverview?.currentUser?.role === "owner") {
          await loadOverview();
        }
      } catch (error) {
        setMessage(keyMessage, error.message, "error");
      }
    });

    copyLatestBtn.addEventListener("click", async () => {
      try {
        await copyToClipboard(lastGeneratedKey, keyMessage, "Key copied to clipboard.");
      } catch (error) {
        setMessage(keyMessage, "Clipboard copy failed.", "error");
      }
    });

    document.getElementById("createResellerBtn").addEventListener("click", async () => {
      try {
        await api("/api/admin/create-reseller", {
          displayName: resellerNameInput.value,
          username: resellerUsernameInput.value,
          password: resellerPasswordInput.value,
        });
        resellerNameInput.value = "";
        resellerUsernameInput.value = "";
        resellerPasswordInput.value = "";
        setMessage(resellerMessage, "Reseller created.", "success");
        await loadOverview();
      } catch (error) {
        setMessage(resellerMessage, error.message, "error");
      }
    });

    viewLogsBtn.addEventListener("click", () => openModal(logsModal));
    manageResellersBtn.addEventListener("click", () => openModal(resellersModal));
    logsFilterSelect.addEventListener("change", () => renderLogs(latestOverview?.keys || []));

    document.querySelectorAll("[data-close]").forEach((button) => {
      button.addEventListener("click", () => closeModal(document.getElementById(button.dataset.close)));
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal(logsModal);
        closeModal(resellersModal);
      }
    });

    refreshExpiryHint();

    (async () => {
      if (!getToken()) return;
      try {
        await loadOverview();
      } catch (error) {
        clearSession();
      }
    })();
  </script>
</body>
</html>
